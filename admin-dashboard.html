<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for the Analytics Feature mentioned in the PDF -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="navbar">
        <h2>Admin Dashboard</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="dashboard-content">
        <div class="card">
            <h3>Post Internship</h3>
            <input type="text" placeholder="Internship Title">
            <button>Post Opportunity</button>
        </div>
        
        <!-- The "Extra Feature" from your PDF -->
        <div class="card" style="grid-column: span 2;">
            <h3>Progress Analytics (Extra Feature)</h3>
            <canvas id="progressChart" width="400" height="150"></canvas>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        function logout() {
            firebase.auth().signOut().then(() => window.location.href = "index.html");
        }

        // Analytics Chart (From PDF requirements)
        const ctx = document.getElementById('progressChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels:['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                datasets:[{
                    label: 'Tasks Completed',
                    data: [12, 19, 25, 43],
                    backgroundColor: '#4e73df'
                }]
            }
        });
    </script>
</body>
</html>
